name: CI-CD

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

permissions:
  contents: read

jobs:
  ci_check:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Use Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "24.x"
          cache: "yarn"
      - run: yarn --frozen-lockfile
      - run: yarn lint
      - run: yarn typecheck
      - run: yarn build
      # PR commitlarini Conventional Commits bo'yicha tekshirish
      - name: Lint PR commits
        if: github.event_name == 'pull_request'
        run: >-
          npx commitlint
          --from ${{ github.event.pull_request.base.sha }}
          --to ${{ github.event.pull_request.head.sha }}
          --verbose

  release:
    runs-on: ubuntu-latest
    needs: ci_check
    # Faqat main'ga push'da reliz (PR'da emas)
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    permissions:
      contents: write # CHANGELOG/tag/commit push + GitHub release
      issues: write # semantic-release izohlari
      pull-requests: write

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0 # semantic-release butun git tarixni talab qiladi
          persist-credentials: false
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "24.x"
          cache: "yarn"
          registry-url: "https://registry.npmjs.org"
      - run: yarn --frozen-lockfile
      - run: yarn build
      - name: Release (semantic-release)
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          NPM_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: yarn release
